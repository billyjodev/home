<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 / Notices - Noise Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .link-card:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .link-card .icon {
            font-size: 24px;
            margin-right: 16px;
        }
        .link-card .text {
            flex: 1;
            text-align: left;
        }
        .link-card .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .link-card .title-en {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            margin-bottom: 2px;
        }
        .link-card .title-ko {
            font-size: 13px;
            color: #888;
        }
        .link-card .arrow {
            font-size: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>공지사항</h1>
        <p class="subtitle">Notices</p>

        <div class="links">
            <a href="licenses.html" class="link-card">
                <span class="icon">📜</span>
                <div class="text">
                    <div class="title-en">Open Source Licenses</div>
                    <div class="title-ko">오픈소스 라이선스</div>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="PRIVACY_POLICY.html" class="link-card">
                <span class="icon">🔒</span>
                <div class="text">
                    <div class="title-en">Privacy Policy</div>
                    <div class="title-ko">개인정보 처리방침</div>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
